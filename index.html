<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Goblin Gold — the hoard</title>
<meta name="description" content="The Goblin Gold games — pick a hoard to play.">
<meta name="theme-color" content="#1a1330">
<style>
  :root{ --bg:#160f29; --bg2:#1f1640; --ink:#ece3ff; --muted:#a892d8; --gold:#e0a93c; --purple:#cda9ff; }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{background:radial-gradient(120% 80% at 50% -10%, #2a1c54 0%, var(--bg) 60%) fixed, var(--bg);
    color:var(--ink); font:600 16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    display:flex; flex-direction:column; align-items:center; padding:clamp(28px,9vh,80px) 18px 40px; gap:8px; min-height:100vh}
  header{text-align:center; margin-bottom:18px}
  h1{font-size:clamp(34px,11vw,60px); margin:0; color:var(--gold); letter-spacing:.01em; text-shadow:0 2px 0 rgba(0,0,0,.35)}
  .sub{margin:6px 0 0; color:var(--purple); font-weight:700; letter-spacing:.18em; text-transform:uppercase; font-size:13px}
  main{width:100%; max-width:560px; display:flex; flex-direction:column; gap:14px}
  .card{display:flex; align-items:center; gap:16px; padding:16px 18px; border-radius:18px; text-decoration:none;
    background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02)); border:1px solid rgba(205,169,255,.18);
    color:var(--ink); transition:transform .12s ease, border-color .12s ease, background .12s ease}
  .card:hover,.card:focus-visible{transform:translateY(-2px); border-color:rgba(224,169,60,.5); background:linear-gradient(180deg, rgba(255,255,255,.1), rgba(255,255,255,.03)); outline:none}
  .card .ic{width:60px; height:60px; border-radius:14px; flex:0 0 auto; background:#0e0a1e; image-rendering:auto; object-fit:cover}
  .card .body{min-width:0}
  .card .nm{font-size:20px; font-weight:800; margin:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .card .meta{margin:2px 0 0; color:var(--muted); font-size:13px; font-weight:700}
  .tag{display:inline-block; margin-left:8px; padding:1px 8px; border-radius:999px; font-size:11px; letter-spacing:.06em;
    text-transform:uppercase; background:rgba(224,169,60,.16); color:var(--gold); vertical-align:middle}
  .tag.dev{background:rgba(205,169,255,.16); color:var(--purple)}
  .empty{color:var(--muted); text-align:center; padding:30px}
  footer{margin-top:26px; color:var(--muted); font-size:12px; opacity:.7}
</style>
</head>
<body>
  <header>
    <h1>Goblin Gold</h1>
    <p class="sub">the hoard grows</p>
  </header>
  <main id="apps"><p class="empty" id="loading">Summoning the hoard…</p></main>
  <footer>One origin, every game. Your gold carries over.</footer>
<script>
// Franchise landing (T222): read apps.json, then each app's own manifest for its
// real name / icon / theme — a card = the app's true identity. Static, no build.
(function(){
  "use strict";
  var mount = document.getElementById("apps"), loading = document.getElementById("loading");
  // T222 — the landing replaced the OLD root app. Unregister only the legacy
  // root-scoped service worker (so it can't shadow this page offline); the
  // sub-folder apps' SWs (gg1/dev, gg1/prod, …) are scoped deeper and left alone.
  try{
    if(navigator.serviceWorker && navigator.serviceWorker.getRegistrations){
      var base = location.pathname.replace(/[^/]*$/, "");   // this landing's directory
      navigator.serviceWorker.getRegistrations().then(function(rs){
        rs.forEach(function(r){ try{ if(new URL(r.scope).pathname === base) r.unregister(); }catch(e){} });
      });
    }
  }catch(e){}
  function esc(s){ return String(s == null ? "" : s).replace(/[&<>"]/g, function(c){ return ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" })[c]; }); }
  function pickIcon(man, base){
    var icons = (man && man.icons) || [];
    // prefer a mid/large raster; fall back to whatever's there
    var best = null;
    for(var i=0;i<icons.length;i++){ var s = icons[i] && icons[i].src; if(!s) continue;
      if(!best) best = s;
      if(/192|256|512/.test(icons[i].sizes || "")) { best = s; if(/512/.test(icons[i].sizes)) break; } }
    return best ? base + best : null;
  }
  async function load(){
    var apps;
    try{ apps = await (await fetch("apps.json", { cache:"no-store" })).json(); }
    catch(e){ loading.textContent = "Couldn't read apps.json."; return; }
    var cards = [];
    for(var i=0;i<apps.length;i++){
      var a = apps[i]; if(!a || !a.path) continue;
      var man = null;
      try{ man = await (await fetch(a.path + "manifest.webmanifest", { cache:"no-store" })).json(); }catch(e){}
      var name = (man && man.name) || a.name || a.path;
      var icon = pickIcon(man, a.path);
      var tagClass = a.tag === "dev" ? "tag dev" : "tag";
      cards.push(
        '<a class="card" href="' + esc(a.path) + '">' +
          (icon ? '<img class="ic" alt="" src="' + esc(icon) + '">' : '<span class="ic"></span>') +
          '<span class="body">' +
            '<p class="nm">' + esc(name) + (a.tag ? ' <span class="' + tagClass + '">' + esc(a.tag) + '</span>' : '') + '</p>' +
            '<p class="meta">' + esc(a.path) + '</p>' +
          '</span>' +
        '</a>');
    }
    mount.innerHTML = cards.length ? cards.join("") : '<p class="empty">No apps deployed yet.</p>';
  }
  load();
})();
</script>
</body>
</html>
