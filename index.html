<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Halves — mental math drills</title>
<meta name="description" content="Fast mental-math drills: halves, doubles, times tables, squares and fraction-to-decimal conversions.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">

  <!-- ENTRY / TAP TO BEGIN (provides the fullscreen + audio user gesture) -->
  <section id="entry" class="screen active">
    <div class="mark">x<span class="slash">/</span>2</div>
    <div class="tag">Fast mental-maths drills</div>
    <div class="entry-actions">
      <button class="btn" id="entryFs">Play in fullscreen</button>
      <button class="linkbtn" id="entryPlay">Play</button>
    </div>
    <button class="linkbtn" id="soundBtn">🔊 Sound on</button>
  </section>

  <!-- START -->
  <section id="start" class="screen">
    <div class="mark" id="mark">x<span class="slash">/</span>2</div>
    <div class="tag" id="tag">Halve it. Fast.</div>
    <div class="picker-wrap">
      <div class="picker" id="modeTabs"></div>
      <span class="scroll-cue" aria-hidden="true">▾</span>
    </div>
    <div class="best" id="bestLine">No best time yet</div>
    <div class="goldbar" id="goldBar"></div>
    <div class="momentumbar" id="momentumBar"></div>
    <button class="btn" id="startBtn">Start</button>
    <div class="linkrow">
      <button class="linkbtn" id="statsBtn">Best times</button>
      <button class="linkbtn" id="invBtn">Inventory</button>
      <button class="linkbtn" id="heroesBtn">Heroes</button>
      <button class="linkbtn" id="arenaBtn">Arena</button>
      <button class="linkbtn" id="soundBtnMenu">🔊 Sound on</button>
      <button class="linkbtn" id="fsBtn" aria-label="Toggle fullscreen">⛶ Fullscreen</button>
    </div>
    <div class="build" id="buildInfo"></div>
  </section>

  <!-- SUMMARY -->
  <section id="summary" class="screen">
    <div class="res-label">Best times</div>
    <div class="sum-sub">Your best in each topic — tap one to play it.</div>
    <div class="sumlist" id="sumList"></div>
    <div class="res-actions">
      <button class="btn ghost" id="sumBack">Back</button>
    </div>
  </section>

  <!-- GAME -->
  <section id="game" class="screen">
    <div class="topbar">
      <span id="counter">1 / 21</span>
      <span class="clock" id="clock">0.0s</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>

    <div class="stage" id="stage">
      <div class="eyebrow" id="eyebrow">half of <b>↓</b></div>
      <div class="promptwrap">
        <div class="prompt" id="prompt">30</div>
        <div class="ghosthalf" id="ghost">15</div>
      </div>
      <div class="answer empty" id="answer"><span class="placeholder">— —</span></div>
    </div>

    <div class="pad" id="pad">
      <div class="key" data-k="7">7</div>
      <div class="key" data-k="8">8</div>
      <div class="key" data-k="9">9</div>
      <div class="key" data-k="4">4</div>
      <div class="key" data-k="5">5</div>
      <div class="key" data-k="6">6</div>
      <div class="key" data-k="1">1</div>
      <div class="key" data-k="2">2</div>
      <div class="key" data-k="3">3</div>
      <div class="key util" data-k=".">.</div>
      <div class="key" data-k="0">0</div>
      <div class="key util" data-k="back">⌫</div>
      <div class="key skip" data-k="skip" style="grid-column:1 / -1">skip</div>
    </div>
  </section>

  <!-- RESULTS -->
  <section id="results" class="screen">
    <div class="res-label">Final time <span class="res-mode" id="resMode"></span></div>
    <div class="res-time" id="resTime">—<small>s</small></div>
    <div class="rankline" id="rankLine"></div>
    <div class="res-row">
      <div class="res-stat"><span class="n" id="resAcc">100%</span><span class="l">accuracy</span></div>
      <div class="res-stat"><span class="n" id="resMiss">0</span><span class="l">skipped</span></div>
    </div>
    <div class="res-gold" id="resGold"></div>
    <div class="slowest">
      <h4>Slowest answers</h4>
      <div id="slowList"></div>
    </div>

    <div class="res-actions">
      <button class="btn" id="againBtn">Play again</button>
      <button class="btn ghost" id="menuBtn">Modes</button>
    </div>
  </section>

  <!-- INVENTORY -->
  <section id="inventory" class="screen">
    <div class="res-label">Inventory <span class="inv-meta" id="invMeta"></span></div>
    <div class="inv-tabs" id="invTabs"></div>
    <div class="invlist" id="invList"></div>
    <button class="jump-top" id="invTop" aria-label="Jump to top">↑ Top</button>
    <div class="res-actions">
      <button class="btn ghost" id="invBack">Back</button>
    </div>
  </section>

  <!-- ARENA -->
  <section id="arena" class="screen">
    <div class="res-label">Arena <span class="inv-meta" id="arenaMeta"></span></div>
    <div class="arena-body" id="arenaBody"></div>
    <div class="res-actions">
      <button class="btn" id="arenaFight" disabled>Pick a hero</button>
      <button class="btn ghost" id="arenaBack">Back</button>
    </div>
  </section>

  <!-- HEROES -->
  <section id="heroes" class="screen">
    <div class="res-label">Heroes <span class="inv-meta" id="heroMeta"></span></div>
    <div class="herolist" id="heroList"></div>
    <div class="res-actions">
      <button class="btn ghost" id="heroesBack">Back</button>
    </div>
  </section>

</div>

<!-- celebration FX overlay (confetti/sparks) -->
<canvas id="fxCanvas" class="fx-canvas" aria-hidden="true"></canvas>

<!-- in-game unlock toasts -->
<div class="toasts" id="toasts"></div>

<!-- UNLOCK / DETAIL MODAL -->
<div class="modal hidden" id="unlockModal">
  <div class="modal-card">
    <div class="modal-title" id="unlockTitle">New collectible!</div>
    <div class="unlock-grid" id="unlockGrid"></div>
    <button class="btn" id="unlockClose">Nice</button>
  </div>
</div>

<script src="modes.js"></script>
<script src="collectibles.js"></script>
<script src="heroes.js"></script>
<script src="enemies.js"></script>
<script src="fx.js"></script>
<script src="sound.js"></script>
<script src="main.js"></script>
</body>
</html>
