name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Icon variation test (gate)
        run: node gg1/dev/test/icon-variation.test.js
      - name: Performance test (gate)
        run: node gg1/dev/test/perf.test.js
      - name: Contrast test (gate)
        run: node gg1/dev/test/contrast.test.js
      - name: Inventory layout test (gate)
        run: node gg1/dev/test/inventory.test.js
      - name: Codex bestiary tab (T179) test (gate)
        run: node gg1/dev/test/codex.test.js
      - name: Developer mode + reveal-all (T184) test (gate)
        run: node gg1/dev/test/dev-reveal.test.js
      - name: Practice hints test (gate)
        run: node gg1/dev/test/hints.test.js
      - name: Practice flow test (gate)
        run: node gg1/dev/test/practice.test.js
      - name: Hero portrait test (gate)
        run: node gg1/dev/test/hero-icons.test.js
      - name: Nav icons + Arena portraits test (gate)
        run: node gg1/dev/test/nav-icons.test.js
      - name: Toast queue test (gate)
        run: node gg1/dev/test/toasts.test.js
      - name: Audio levels test (gate)
        run: node gg1/dev/test/sound.test.js
      - name: Gold economy (T178 ramp) test (gate)
        run: node gg1/dev/test/gold.test.js
      - name: Audio resume (foghorn) test (gate)
        run: node gg1/dev/test/audio-resume.test.js
      - name: Music idempotent switch (T164) test (gate)
        run: node gg1/dev/test/music-idempotent.test.js
      - name: Hero detail test (gate)
        run: node gg1/dev/test/hero-detail.test.js
      - name: Arena wayfinding test (gate)
        run: node gg1/dev/test/wayfinding.test.js
      - name: Enemy sprite variation test (gate)
        run: node gg1/dev/test/monster-variation.test.js
      - name: Region scenery test (gate)
        run: node gg1/dev/test/scenery.test.js
      - name: Version check test (gate)
        run: node gg1/dev/test/version.test.js
      - name: Topic-init gate test (gate)
        run: node gg1/dev/test/init-gate.test.js
      - name: Collector ladder test (gate)
        run: node gg1/dev/test/collector.test.js
      - name: Pixel glyph font test (gate)
        run: node gg1/dev/test/glyphs.test.js
      - name: Events scheduler test (gate)
        run: node gg1/dev/test/events.test.js
      - name: Guide action test (gate)
        run: node gg1/dev/test/guide-action.test.js
      - name: Guides + explain coverage test (gate)
        run: node gg1/dev/test/guides-coverage.test.js
      - name: Question-integrity test (gate)
        run: node gg1/dev/test/question-integrity.test.js
      - name: T219 batch 1 (roman + primes) test (gate)
        run: node gg1/dev/test/t219-roman-primes.test.js
      - name: T219 batch 2 (pctup + fdp) test (gate)
        run: node gg1/dev/test/t219-pctup-fdp.test.js
      - name: T219 batch 3 (bodmas + algebra) test (gate)
        run: node gg1/dev/test/t219-bodmas-algebra.test.js
      - name: T219 batch 4 (xtricks + negatives) test (gate)
        run: node gg1/dev/test/t219-xtricks-negatives.test.js
      - name: T219 batch 5 (Geometry group) test (gate)
        run: node gg1/dev/test/t219-geometry.test.js
      - name: T219 batch 6 (mmr + sdt) test (gate)
        run: node gg1/dev/test/t219-mmr-sdt.test.js
      - name: T219 batch 7 (factors & multiples) test (gate)
        run: node gg1/dev/test/t219-factors.test.js
      - name: Nav notification badges (T218) test (gate)
        run: node gg1/dev/test/nav-badges.test.js
      - name: Tech-tree view test (gate)
        run: node gg1/dev/test/tech-tree.test.js
      - name: Settings + clear-data test (gate)
        run: node gg1/dev/test/settings-reset.test.js
      - name: Onboarding gating test (gate)
        run: node gg1/dev/test/onboarding.test.js
      - name: Arena 3v3 deterministic-sim lattice test (gate)
        run: node gg1/dev/test/arena3.test.js
      - name: Arena playout death-VFX test (gate)
        run: node gg1/dev/test/arena-playout-fx.test.js
      - name: T162 P1 (scaling / percentoff / partwhole) modes test (gate)
        run: node gg1/dev/test/t162-p1-modes.test.js
      - name: T162 P2 (ratioshare / timegap / lcmhcf / mean) modes test (gate)
        run: node gg1/dev/test/t162-p2-modes.test.js
      - name: T162 P3 (cubes / money / digitsum) modes test (gate)
        run: node gg1/dev/test/t162-p3-modes.test.js
      - name: T59 Wave-2 (rounding / larger ×÷) modes test (gate)
        run: node gg1/dev/test/t59-modes.test.js
      - name: T60/T61 Wave-2 (metric / sequences) modes test (gate)
        run: node gg1/dev/test/t60-t61-modes.test.js
      - name: Home layout + tidy-nav test (gate)
        run: node gg1/dev/test/home-layout.test.js
      - name: UI pixel-bevel restyle test (gate)
        run: node gg1/dev/test/ui-restyle.test.js
      - name: Chrome pixel-icons test (gate)
        run: node gg1/dev/test/icons.test.js
      - name: Synth generative-audio engine test (gate)
        run: node gg1/dev/test/synth.test.js
      - name: Synth wiring test (gate)
        run: node gg1/dev/test/synth-wiring.test.js
      - name: Asset cache-busting test (gate)
        run: node gg1/dev/test/cache-bust.test.js
      - name: Self-hosted fonts (T169) test (gate)
        run: node gg1/dev/test/fonts.test.js
      - name: FXGL engine test (gate)
        run: node gg1/dev/test/fxgl.test.js
      - name: Brand emblems (T181) test (gate)
        run: node gg1/dev/test/emblems.test.js
      - name: FX wiring test (gate)
        run: node gg1/dev/test/fx-wiring.test.js
      - name: Gold-hoard wiring (T173) test (gate)
        run: node gg1/dev/test/hoard-wiring.test.js
      - name: App icon (Magnar, T194) test (gate)
        run: node gg1/dev/test/icon-app.test.js
      - name: PWA (manifest + service worker) test (gate)
        run: node gg1/dev/test/pwa.test.js
      - name: Franchise GHP restructure (T222) test (gate)
        run: node gg1/dev/test/franchise-landing.test.js
      - name: Install-display (fullscreen affordances) test (gate)
        run: node gg1/dev/test/install-display.test.js
      - name: Back-button navigation test (gate)
        run: node gg1/dev/test/back-nav.test.js
      - name: FXGL golden-render test (gate)
        run: node gg1/dev/test/golden-fx.test.js
      - name: Synth golden-score test (gate)
        run: node gg1/dev/test/golden-synth.test.js
      - name: Content-as-data export parity (T229) test (gate)
        run: node test/content-parity.test.js
      - name: Earning export parity (T233) test (gate)
        run: node test/earning-parity.test.js
      - name: Gold export parity (T233b) test (gate)
        run: node test/gold-parity.test.js
      - name: Combat export parity (T233b-combat) test (gate)
        run: node test/combat-parity.test.js
      - name: Events export parity (T233c) test (gate)
        run: node test/events-parity.test.js
      - name: Art export parity (F1 icons + F2 foes) test (gate)
        run: node test/art-parity.test.js
      - name: Scene export parity (F3 scenery + F4 eventart) test (gate)
        run: node test/scene-parity.test.js
      - name: Visual parity (web refs vs brickmap renders, perceptual) test (gate)
        run: node test/visual-parity.test.js
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Write build info (per app — each fetches its own ./build.json)
        run: |
          STAMP=$(printf '{"sha":"%s","shortSha":"%s","time":"%s"}' \
            "$GITHUB_SHA" "${GITHUB_SHA:0:7}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)")
          echo "$STAMP" | tee gg1/dev/build.json gg1/prod/build.json
      - name: Cache-bust asset URLs (per app — append ?v=<shortSha> to each app's index.html + self-hosted font url()s)
        run: |
          for app in gg1/dev gg1/prod; do
            node gg1/dev/scripts/cachebust.js "${GITHUB_SHA:0:7}" "$app/index.html"
            node gg1/dev/scripts/cachebust.js "${GITHUB_SHA:0:7}" "$app/styles.css"
          done
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
