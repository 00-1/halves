name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Icon variation test (gate)
        run: node test/icon-variation.test.js
      - name: Performance test (gate)
        run: node test/perf.test.js
      - name: Contrast test (gate)
        run: node test/contrast.test.js
      - name: Inventory layout test (gate)
        run: node test/inventory.test.js
      - name: Arena stat-check test (gate)
        run: node test/arena.test.js
      - name: Practice hints test (gate)
        run: node test/hints.test.js
      - name: Practice flow test (gate)
        run: node test/practice.test.js
      - name: Hero portrait test (gate)
        run: node test/hero-icons.test.js
      - name: Nav icons + Arena portraits test (gate)
        run: node test/nav-icons.test.js
      - name: Toast queue test (gate)
        run: node test/toasts.test.js
      - name: Audio levels test (gate)
        run: node test/sound.test.js
      - name: Hero detail test (gate)
        run: node test/hero-detail.test.js
      - name: Arena wayfinding test (gate)
        run: node test/wayfinding.test.js
      - name: Enemy sprite variation test (gate)
        run: node test/monster-variation.test.js
      - name: Region scenery test (gate)
        run: node test/scenery.test.js
      - name: Version check test (gate)
        run: node test/version.test.js
      - name: Topic-init gate test (gate)
        run: node test/init-gate.test.js
      - name: Collector ladder test (gate)
        run: node test/collector.test.js
      - name: Pixel glyph font test (gate)
        run: node test/glyphs.test.js
      - name: Events scheduler test (gate)
        run: node test/events.test.js
      - name: Guide action test (gate)
        run: node test/guide-action.test.js
      - name: Tech-tree view test (gate)
        run: node test/tech-tree.test.js
      - name: Settings + clear-data test (gate)
        run: node test/settings-reset.test.js
      - name: Onboarding gating test (gate)
        run: node test/onboarding.test.js
      - name: Arena 3v3 deterministic-sim lattice test (gate)
        run: node test/arena3.test.js
      - name: Home layout + tidy-nav test (gate)
        run: node test/home-layout.test.js
      - name: UI pixel-bevel restyle test (gate)
        run: node test/ui-restyle.test.js
      - name: Chrome pixel-icons test (gate)
        run: node test/icons.test.js
      - name: Asset cache-busting test (gate)
        run: node test/cache-bust.test.js
      - name: FXGL engine test (gate)
        run: node test/fxgl.test.js
      - name: FX wiring test (gate)
        run: node test/fx-wiring.test.js
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Write build info
        run: |
          printf '{"sha":"%s","shortSha":"%s","time":"%s"}\n' \
            "$GITHUB_SHA" "${GITHUB_SHA:0:7}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > build.json
          cat build.json
      - name: Cache-bust asset URLs (append ?v=<shortSha> to the deployed index.html)
        run: node scripts/cachebust.js "${GITHUB_SHA:0:7}"
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
