name: Capacitor Android (experiment)

# T231 — builds the Capacitor (in-process WebView) Android wrapper experiment.
# This is NOT the shipping path and is kept entirely OUT of the Pages deploy
# (pages.yml is untouched). It bundles gg1/prod offline, scaffolds the Android
# platform, builds + signs a release .aab (+ a sideload .apk), and uploads them
# as artifacts to test on-device under the SEPARATE experiment package
# app.goblingold.voidthrone.exp.
#
# TRIGGERS (owner, 2026-06-29 — "set it up to run on commits where the builder is
# ready to show something" — manual was too much friction):
#   • workflow_dispatch — manual, any time.
#   • push to main that touches the WEB APP (gg1/dev, gg1/prod, capacitor/**) — i.e.
#     the commits that actually change what the APK shows. Doc/render-only commits
#     (which never affect this WebView wrapper) do NOT rebuild. The .apk lands as a
#     run artifact each time; download + sideload.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'gg1/prod/**'
      - 'gg1/dev/**'
      - 'capacitor/**'

# newest qualifying commit supersedes an in-flight build (saves CI minutes)
concurrency:
  group: capacitor-apk
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: capacitor
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor (CLI + platforms)
        run: npm install

      - name: Sync gg1/prod into the web dir
        run: npm run sync:www

      - name: Scaffold the Android platform
        run: npx cap add android

      - name: Apply fullscreen / cutout theme override
        run: cp android-overrides/res/values/styles.xml android/app/src/main/res/values/styles.xml

      - name: Capacitor sync
        run: npx cap sync android

      - name: Gradle build (release bundle + apk)
        working-directory: capacitor/android
        run: ./gradlew bundleRelease assembleRelease --no-daemon --stacktrace

      - name: Sign artifacts (throwaway key if no production secret — sideload APK is always installable)
        env:
          KS_B64: ${{ secrets.CAP_EXP_KEYSTORE_B64 }}
          KS_PASS: ${{ secrets.CAP_EXP_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.CAP_EXP_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.CAP_EXP_KEY_PASSWORD }}
        run: |
          set -e
          BT=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -n1)
          APK_IN=$(find android -path '*/apk/release/*.apk' | head -n1)
          if [ -z "$KS_B64" ]; then
            # No production keystore → generate a THROWAWAY key so the sideload APK still installs
            # on-device (Android only refuses TRULY unsigned APKs; any signature, incl. a self-gen
            # debug key, is fine for sideload — only Play UPLOAD needs the real upload keystore).
            echo "::notice::No production keystore secret — signing the sideload APK with a throwaway key (installable on-device; the .aab is left unsigned, which is fine since Play upload isn't the goal of this experiment build)."
            keytool -genkeypair -keystore exp.jks -storepass android -keypass android -alias exp \
              -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=GG Cap Experiment, O=throwaway"
            KS_PASS=android; KEY_PASS=android; KEY_ALIAS=exp
          else
            echo "$KS_B64" | base64 -d > exp.jks
            AAB=$(find android -path '*/bundle/release/*.aab' | head -n1)
            echo "signing bundle: $AAB"
            jarsigner -keystore exp.jks -storepass "$KS_PASS" -keypass "$KEY_PASS" \
              -sigalg SHA256withRSA -digestalg SHA-256 "$AAB" "$KEY_ALIAS"
            jarsigner -verify "$AAB" && echo "AAB signature verified"
          fi
          # Sideload APK: zipalign + apksigner (v2/v3) for direct on-device install — throwaway OR real key.
          "$BT/zipalign" -f 4 "$APK_IN" app-release-aligned.apk
          "$BT/apksigner" sign --ks exp.jks --ks-pass "pass:$KS_PASS" --key-pass "pass:$KEY_PASS" \
            --ks-key-alias "$KEY_ALIAS" --out app-release-signed.apk app-release-aligned.apk
          "$BT/apksigner" verify app-release-signed.apk && echo "APK signature verified"
          rm -f exp.jks

      - name: Collect artifacts
        run: |
          mkdir -p out
          find android -path '*/bundle/release/*.aab' -exec cp {} out/ \; || true
          [ -f app-release-signed.apk ] && cp app-release-signed.apk out/ || \
            find android -path '*/apk/release/*.apk' -exec cp {} out/ \; || true
          ls -la out

      - name: Upload .aab + .apk
        uses: actions/upload-artifact@v4
        with:
          name: goblin-gold-cap-android
          path: capacitor/out/*
          if-no-files-found: error
